on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - '**'

permissions: read-all

jobs:
  setup-client:
    name: 'Setup client'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
    - name: Checkout git repo
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Setup Node
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: client/package-lock.json
    - name: Install dependencies
      run: npm ci

  setup-server:
    name: 'Setup server'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout git repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install NestJS CLI
        run: npm install -g @nestjs/cli@11
      - name: Generate Prisma client
        run: npm run db:generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      - name: Cache generated Prisma client
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: server/src/generated
          key: prisma-client-${{ hashFiles('server/prisma/schema.prisma') }}

  client-lint-check:
    name: 'Client: Lint checks'
    runs-on: ubuntu-latest
    needs: setup-client
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout git repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run linting check
        run: npm run lint
      - name: Build app
        run: npm run build

  client-tests:
    name: 'Client: Tests'
    runs-on: ubuntu-latest
    needs: setup-client
    steps:
      - name: Run tests
        run: echo "No tests yet"

  server-tests:
    name: 'Server: Tests'
    runs-on: ubuntu-latest
    needs: setup-server
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout git repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Restore generated Prisma client cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: server/src/generated
          key: prisma-client-${{ hashFiles('server/prisma/schema.prisma') }}
      - name: Run tests
        run: npm run test

  server-lint-check:
    name: 'Server: Lint checks'
    runs-on: ubuntu-latest
    needs: setup-server
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout git repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install NestJS CLI
        run: npm install -g @nestjs/cli@11
      - name: Restore generated Prisma client cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: server/src/generated
          key: prisma-client-${{ hashFiles('server/prisma/schema.prisma') }}
      - name: Run linting check
        run: npm run lint
      - name: Build server
        run: npm run build
