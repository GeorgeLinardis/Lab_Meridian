on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - '**'

jobs:
  setup-client:
    name: 'Setup client'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
    - name: Checkout git repo
      uses: actions/checkout@v5
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
    - name: Install dependencies
      run: npm install
    - name: Cache client node_modules
      uses: actions/cache@v4
      with:
        path: client/node_modules
        key: client-node-modules-${{ hashFiles('client/package-lock.json') }}

  setup-server:
    name: 'Setup server'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout git repo
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Generate Prisma client
        run: npm run db:generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      - name: Cache server node_modules
        uses: actions/cache@v4
        with:
          path: server/node_modules
          key: server-node-modules-${{ hashFiles('server/package-lock.json') }}
      - name: Cache generated Prisma client
        uses: actions/cache@v4
        with:
          path: server/src/generated
          key: prisma-client-${{ hashFiles('server/prisma/schema.prisma') }}

  client-lint-check:
    name: 'Client: Lint checks'
    runs-on: ubuntu-latest
    needs: setup-client
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout git repo
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Restore client node_modules cache
        uses: actions/cache@v4
        with:
          path: client/node_modules
          key: client-node-modules-${{ hashFiles('client/package-lock.json') }}
      - name: Run linting check
        run: npm run lint
      - name: Build app
        run: npm run build

  client-tests:
    name: 'Client: Tests'
    runs-on: ubuntu-latest
    needs: setup-client
    steps:
      - name: Run tests
        run: echo "No tests yet"

  server-tests:
    name: 'Server: Tests'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    needs: setup-server
    steps:
      - name: Checkout git repo
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Restore server node_modules cache
        uses: actions/cache@v4
        with:
          path: server/node_modules
          key: server-node-modules-${{ hashFiles('server/package-lock.json') }}
      - name: Restore generated Prisma client cache
        uses: actions/cache@v4
        with:
          path: server/src/generated
          key: prisma-client-${{ hashFiles('server/prisma/schema.prisma') }}
      - name: Run tests
        run: npm run test

  server-lint-check:
    name: 'Server: Lint checks'
    runs-on: ubuntu-latest
    needs: setup-server
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout git repo
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Restore server node_modules cache
        uses: actions/cache@v4
        with:
          path: server/node_modules
          key: server-node-modules-${{ hashFiles('server/package-lock.json') }}
      - name: Restore generated Prisma client cache
        uses: actions/cache@v4
        with:
          path: server/src/generated
          key: prisma-client-${{ hashFiles('server/prisma/schema.prisma') }}
      - name: Build server
        run: npm run build
